# gruff-py configuration - `.gruff-py.yaml` (ADR-006)
#
# This file is dogfood: gruff-py uses it when running `gruff-py analyse src/`
# against itself. It mirrors the `[tool.gruff-py]` block in `pyproject.toml`.
# `.gruff-py.yaml` takes precedence over `pyproject.toml` when both exist.
#
# The selection.pillars list names every built-in rubric/pillar, and
# selection.rules plus rules.* name every built-in rule. Rule entries repeat
# built-in defaults so adding/removing a built-in rule is visible in this file.

schemaVersion: gruff-py.config.v0.1
minimumPythonVersion: '3.11'
paths:
  ignore:
  - .agents/
  - .antigravitycli/
  - .claude/
  - .codex/
  - .github/
  - .goat-flow/
  - tests/fixtures/**
allowlists:
  acceptedAbbreviations:
  - id
  - ctx
  - url
  - ip
  - io
  - ui
  - fn
  - uri
  - db
  - ok
  - api
  - css
  - html
  - json
  - yaml
  - xml
  - sql
  - pk
  - fk
  - params
  - attr
  - func
  - idx
  - tmp
  secretPreviews: []
  deadCode:
    symbols: []
    decorators: []
    paths: []
selection:
  tiers:
  - v0.1
  pillars:
  - complexity
  - maintainability
  - dead-code
  - design
  - documentation
  - modernisation
  - naming
  - security
  - sensitive-data
  - size
  - test-quality
  rules:
  - complexity.cognitive
  - complexity.cyclomatic
  - complexity.halstead-volume
  - complexity.maintainability-index
  - complexity.nesting-depth
  - dead-code.unused-private-attribute
  - dead-code.unused-private-function
  - design.single-implementor-protocol
  - docs.complex-branch-rationale
  - docs.dataclass-attributes
  - docs.ignore-directive-reason
  - docs.missing-class-docstring
  - docs.missing-function-docstring
  - docs.missing-module-docstring
  - docs.missing-param-doc
  - docs.missing-raises-doc
  - docs.missing-readme
  - docs.missing-return-doc
  - docs.stale-param-doc
  - docs.todo-density
  - docs.useless-docstring
  - modernisation.f-string-candidate
  - naming.abbreviation
  - naming.boolean-prefix
  - naming.confusing-name
  - naming.generic-function
  - naming.hungarian-notation
  - naming.identifier-quality
  - naming.module-name-mismatch
  - naming.short-variable
  - naming.test-naming-consistency
  - security.cors-wildcard-with-credentials
  - security.dangerous-function-call
  - security.disabled-ssl-verification
  - security.django-mark-safe
  - security.django-raw-sql
  - security.error-suppression
  - security.extract-compact-user-input
  - security.flask-debug-enabled
  - security.github-actions-broad-permissions
  - security.github-actions-pull-request-target
  - security.github-actions-remote-shell
  - security.github-actions-secrets-in-pr
  - security.github-actions-unpinned-action
  - security.hardcoded-bind-all-interfaces
  - security.hardcoded-framework-secret-key
  - security.header-injection
  - security.insecure-random
  - security.insecure-temp-file
  - security.insecure-tls-protocol
  - security.jinja2-autoescape-off
  - security.paramiko-no-host-key-check
  - security.path-traversal
  - security.shell-injection
  - security.silent-except
  - security.sql-concatenation
  - security.ssrf
  - security.unsafe-pickle
  - security.unsafe-yaml-load
  - security.variable-import
  - security.weak-crypto
  - security.xxe
  - sensitive-data.api-key-pattern
  - sensitive-data.aws-access-key
  - sensitive-data.database-url-password
  - sensitive-data.hardcoded-env-value
  - sensitive-data.high-entropy-string
  - sensitive-data.jwt-token
  - sensitive-data.phi-pattern
  - sensitive-data.pii-test-fixture
  - sensitive-data.private-key
  - size.attribute-count
  - size.average-function-length
  - size.class-length
  - size.file-length
  - size.function-length
  - size.parameter-count
  - size.public-method-count
  - test-quality.conditional-logic
  - test-quality.eager-test
  - test-quality.empty-parametrize
  - test-quality.exception-type-only
  - test-quality.excessive-mocking
  - test-quality.extends-production-class
  - test-quality.global-state-mutation
  - test-quality.loop-assertion-without-message
  - test-quality.loop-in-test
  - test-quality.magic-number-assertion
  - test-quality.mock-only-test
  - test-quality.mock-without-expectation
  - test-quality.mocking-domain-object
  - test-quality.multiple-aaa-cycles
  - test-quality.mystery-guest
  - test-quality.naming-consistency
  - test-quality.no-assertions
  - test-quality.parametrize-annotation
  - test-quality.private-reflection
  - test-quality.pytest-coverage-source-missing
  - test-quality.pytest-deprecations-not-fatal
  - test-quality.pytest-strict-config-missing
  - test-quality.repeated-structure-missing-parametrize
  - test-quality.setup-bloat
  - test-quality.skipped-without-reason
  - test-quality.sleep-in-test
  - test-quality.sut-not-called
  - test-quality.tautological-type-assertion
  - test-quality.test-function-too-long
  - test-quality.test-longer-than-sut
  - test-quality.trivial-assertion
  - test-quality.trivial-snapshot
  - test-quality.unused-mock
  - waste.commented-out-code
  - waste.empty-class
  - waste.empty-function
  - waste.one-line-function
  - waste.redundant-variable
  - waste.unreachable-code
  - waste.unused-import
  - waste.unused-parameter
  excludePillars: []
  excludeRules: []
rules:
  complexity.cognitive:
    enabled: true
    threshold: 30
    severity: error
  complexity.cyclomatic:
    enabled: true
    threshold: 20
    severity: error
  complexity.halstead-volume:
    enabled: true
    threshold: 400
    severity: error
  complexity.maintainability-index:
    enabled: true
    threshold: 70
    severity: error
  complexity.nesting-depth:
    enabled: true
    threshold: 6
    severity: error
  dead-code.unused-private-attribute:
    enabled: true
  dead-code.unused-private-function:
    enabled: true
  design.single-implementor-protocol:
    enabled: true
    options:
      externalProtocolBases:
      - Sized
      - Iterable
      - Iterator
      - Collection
      - Container
      - Sequence
      - Mapping
      - MutableMapping
      - Callable
      - ContextManager
      - AsyncContextManager
      additionalExcludedPaths: []
  docs.complex-branch-rationale:
    enabled: true
    options:
      cyclomatic_warning: 10
      cognitive_warning: 15
      private_cyclomatic_warning: 15
      private_cognitive_warning: 20
  docs.dataclass-attributes:
    enabled: true
    options:
      min_fields: 3
      require_all_fields: false
      allow_bullets: true
  docs.ignore-directive-reason:
    enabled: true
  docs.missing-class-docstring:
    enabled: true
    options:
      class_dataclass_exempt: false
  docs.missing-function-docstring:
    enabled: true
  docs.missing-module-docstring:
    enabled: true
  docs.missing-param-doc:
    enabled: true
  docs.missing-raises-doc:
    enabled: true
  docs.missing-readme:
    enabled: true
  docs.missing-return-doc:
    enabled: true
  docs.stale-param-doc:
    enabled: true
  docs.todo-density:
    enabled: true
    threshold: 10
    severity: error
  docs.useless-docstring:
    enabled: true
    options:
      min_summary_words:
        module: 6
        class: 4
        function: 4
  modernisation.f-string-candidate:
    enabled: true
  naming.abbreviation:
    enabled: true
  naming.boolean-prefix:
    enabled: true
    options:
      acceptedBooleanNames:
      - all
      - apply
      - check
      - dev
      - enabled
      - force
      - fresh
      - harness
      - json
      - ok
      - verbose
      - "yes"
  naming.confusing-name:
    enabled: true
    options:
      confusingNames:
      - Handler
      - Processor
      - Manager
      - Util
      - Utils
      - Helper
      - Helpers
      - Data
      - Info
      - Service
      - Stuff
      - Thing
      - Object
      - Item
  naming.generic-function:
    enabled: true
    options:
      genericFunctions:
      - process
      - handle
      - do
      - run
      - execute
      - perform
      - apply
      - manage
      - operate
  naming.hungarian-notation:
    enabled: true
  naming.identifier-quality:
    enabled: true
  naming.module-name-mismatch:
    enabled: true
    options:
      conventionalModuleNames:
      - constants
      - exceptions
      - helpers
      - protocols
      - types
      - cli
      - dashboard_server
      - python_parser
      - _halstead
      - _secret_scanner_helper
      - _comment_scanner
  naming.short-variable:
    enabled: true
    options:
      acceptedShortNames:
      - i
      - j
      - k
      - n
      - m
      - x
      - y
      - z
      - e
      - _
      - f
  naming.test-naming-consistency:
    enabled: true
  security.cors-wildcard-with-credentials:
    enabled: true
  security.dangerous-function-call:
    enabled: true
  security.disabled-ssl-verification:
    enabled: true
  security.django-mark-safe:
    enabled: true
  security.django-raw-sql:
    enabled: true
  security.error-suppression:
    enabled: true
  security.extract-compact-user-input:
    enabled: true
  security.flask-debug-enabled:
    enabled: true
  security.github-actions-broad-permissions:
    enabled: true
  security.github-actions-pull-request-target:
    enabled: true
  security.github-actions-remote-shell:
    enabled: true
  security.github-actions-secrets-in-pr:
    enabled: true
  security.github-actions-unpinned-action:
    enabled: true
  security.hardcoded-bind-all-interfaces:
    enabled: true
  security.hardcoded-framework-secret-key:
    enabled: true
  security.header-injection:
    enabled: true
  security.insecure-random:
    enabled: true
  security.insecure-temp-file:
    enabled: true
  security.insecure-tls-protocol:
    enabled: true
  security.jinja2-autoescape-off:
    enabled: true
  security.paramiko-no-host-key-check:
    enabled: true
  security.path-traversal:
    enabled: true
  security.shell-injection:
    enabled: true
  security.silent-except:
    enabled: true
  security.sql-concatenation:
    enabled: true
  security.ssrf:
    enabled: true
  security.unsafe-pickle:
    enabled: true
  security.unsafe-yaml-load:
    enabled: true
  security.variable-import:
    enabled: true
  security.weak-crypto:
    enabled: true
  security.xxe:
    enabled: true
  sensitive-data.api-key-pattern:
    enabled: true
  sensitive-data.aws-access-key:
    enabled: true
  sensitive-data.database-url-password:
    enabled: true
  sensitive-data.hardcoded-env-value:
    enabled: true
  sensitive-data.high-entropy-string:
    enabled: true
  sensitive-data.jwt-token:
    enabled: true
  sensitive-data.phi-pattern:
    enabled: true
  sensitive-data.pii-test-fixture:
    enabled: true
  sensitive-data.private-key:
    enabled: true
  size.attribute-count:
    enabled: true
    threshold: 15
    severity: error
  size.average-function-length:
    enabled: true
    threshold: 100
    severity: error
  size.class-length:
    enabled: true
    threshold: 1000
    severity: error
  size.file-length:
    enabled: true
    threshold: 1000
    severity: error
  size.function-length:
    enabled: true
    threshold: 100
    severity: error
  size.parameter-count:
    enabled: true
    threshold: 10
    severity: error
  size.public-method-count:
    enabled: true
    threshold: 10
    severity: error
  test-quality.conditional-logic:
    enabled: true
  test-quality.eager-test:
    enabled: true
    thresholds:
      maxAssertions: 5
  test-quality.empty-parametrize:
    enabled: true
  test-quality.exception-type-only:
    enabled: true
  test-quality.excessive-mocking:
    enabled: true
    thresholds:
      maxMocks: 4
  test-quality.extends-production-class:
    enabled: true
  test-quality.global-state-mutation:
    enabled: true
  test-quality.loop-assertion-without-message:
    enabled: true
  test-quality.loop-in-test:
    enabled: true
  test-quality.magic-number-assertion:
    enabled: true
    options:
      allowed_numbers:
      - -1
      - 0
      - 1
      - 2
      - 3
      - 200
      - 201
      - 204
      - 301
      - 302
      - 400
      - 401
      - 403
      - 404
      - 409
      - 422
      - 429
      - 500
      - 502
      - 503
      - 504
  test-quality.mock-only-test:
    enabled: true
  test-quality.mock-without-expectation:
    enabled: true
  test-quality.mocking-domain-object:
    enabled: true
    options:
      domain_namespaces: []
  test-quality.multiple-aaa-cycles:
    enabled: true
    thresholds:
      maxCycles: 2
  test-quality.mystery-guest:
    enabled: true
  test-quality.naming-consistency:
    enabled: true
  test-quality.no-assertions:
    enabled: true
  test-quality.parametrize-annotation:
    enabled: true
    thresholds:
      maxCasesWithoutIds: 2
  test-quality.private-reflection:
    enabled: true
  test-quality.pytest-coverage-source-missing:
    enabled: true
  test-quality.pytest-deprecations-not-fatal:
    enabled: true
  test-quality.pytest-strict-config-missing:
    enabled: true
  test-quality.repeated-structure-missing-parametrize:
    enabled: true
    thresholds:
      minGroupSize: 3
  test-quality.setup-bloat:
    enabled: true
    thresholds:
      maxSetupLines: 30
  test-quality.skipped-without-reason:
    enabled: true
  test-quality.sleep-in-test:
    enabled: true
  test-quality.sut-not-called:
    enabled: true
  test-quality.tautological-type-assertion:
    enabled: true
  test-quality.test-function-too-long:
    enabled: true
    threshold: 100
    severity: error
  test-quality.test-longer-than-sut:
    enabled: true
    options:
      ratio: 2.0
  test-quality.trivial-assertion:
    enabled: true
  test-quality.trivial-snapshot:
    enabled: true
  test-quality.unused-mock:
    enabled: true
  waste.commented-out-code:
    enabled: true
  waste.empty-class:
    enabled: true
  waste.empty-function:
    enabled: true
  waste.one-line-function:
    enabled: true
  waste.redundant-variable:
    enabled: true
  waste.unreachable-code:
    enabled: true
  waste.unused-import:
    enabled: true
  waste.unused-parameter:
    enabled: true

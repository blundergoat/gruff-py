# gruff-py configuration - .gruff-py.yaml
# Generated by `gruff-py init`. Mirrors RuleRegistry.defaults() plus starter ignores.
# Built-in ignores and .gitignore already apply; add project-specific globs below.
# After reviewing findings, `gruff-py analyse . --generate-baseline` records known debt.
# See docs/configuration.md for the full key reference.
schemaVersion: gruff-py.config.v0.1
minimumSeverity:
  analyse: advisory
  report: none
  dashboard: none
minimumPythonVersion: '3.11'
paths:
  ignore:
  - .agents/
  - .antigravitycli/
  - .claude/
  - .codex/
  - .github/
  - .goat-flow/
  - tests/fixtures/**
allowlists:
  acceptedAbbreviations:
  - age
  - app
  - db
  - fs
  - id
  - io
  - key
  - log
  - max
  - min
  - now
  - raw
  - rx
  - tx
  - ui
  - url
  secretPreviews: []
  deadCode:
    symbols: []
    decorators: []
    paths: []
selection:
  tiers: []
  pillars: []
  rules: []
  excludePillars: []
  excludeRules: []
rules:
  # Cognitive complexity
  complexity.cognitive:
    enabled: true
    threshold: 30
    severity: error
  # Cyclomatic complexity
  complexity.cyclomatic:
    enabled: true
    threshold: 20
    severity: error
  # Halstead volume
  complexity.halstead-volume:
    enabled: true
    threshold: 400
    severity: error
  # Maintainability index
  complexity.maintainability-index:
    enabled: true
    threshold: 70
    severity: error
  # Nesting depth
  complexity.nesting-depth:
    enabled: true
    threshold: 6
    severity: error
  # Unused private attribute
  dead-code.unused-private-attribute:
    enabled: true
  # Unused private function
  dead-code.unused-private-function:
    enabled: true
  # Single-implementor Protocol/ABC
  design.single-implementor-protocol:
    enabled: true
    options:
      externalProtocolBases:
      - Sized
      - Iterable
      - Iterator
      - Collection
      - Container
      - Sequence
      - Mapping
      - MutableMapping
      - Callable
      - ContextManager
      - AsyncContextManager
      additionalExcludedPaths: []
  # Complex branch rationale
  docs.complex-branch-rationale:
    enabled: true
    options:
      cyclomatic_warning: 10
      cognitive_warning: 15
      private_cyclomatic_warning: 15
      private_cognitive_warning: 20
  # Dataclass attributes
  docs.dataclass-attributes:
    enabled: true
    options:
      min_fields: 3
      require_all_fields: false
      allow_bullets: true
  # Ignore directive reason
  docs.ignore-directive-reason:
    enabled: true
  # Missing class docstring
  docs.missing-class-docstring:
    enabled: true
    options:
      class_dataclass_exempt: false
  # Missing function docstring
  docs.missing-function-docstring:
    enabled: true
  # Missing module docstring
  docs.missing-module-docstring:
    enabled: true
  # Missing parameter documentation
  docs.missing-param-doc:
    enabled: true
  # Missing raises documentation
  docs.missing-raises-doc:
    enabled: true
  # Missing README
  docs.missing-readme:
    enabled: true
  # Missing return documentation
  docs.missing-return-doc:
    enabled: true
  # Stale parameter documentation
  docs.stale-param-doc:
    enabled: true
  # TODO density
  docs.todo-density:
    enabled: true
    threshold: 10
    severity: error
  # Useless docstring
  docs.useless-docstring:
    enabled: true
    options:
      min_summary_words:
        module: 6
        class: 4
        function: 4
  # F-string candidate
  modernisation.f-string-candidate:
    enabled: true
  # Abbreviation
  naming.abbreviation:
    enabled: true
  # Boolean prefix
  naming.boolean-prefix:
    enabled: true
    options:
      acceptedBooleanNames:
      - all
      - apply
      - check
      - dev
      - enabled
      - force
      - fresh
      - harness
      - json
      - ok
      - verbose
      - 'yes'
  # Confusing class name
  naming.confusing-name:
    enabled: true
    options:
      confusingNames:
      - Handler
      - Processor
      - Manager
      - Util
      - Utils
      - Helper
      - Helpers
      - Data
      - Info
      - Service
      - Stuff
      - Thing
      - Object
      - Item
  # Generic function name
  naming.generic-function:
    enabled: true
    options:
      genericFunctions:
      - process
      - handle
      - do
      - run
      - execute
      - perform
      - apply
      - manage
      - operate
  # Hungarian notation
  naming.hungarian-notation:
    enabled: true
  # Identifier quality
  naming.identifier-quality:
    enabled: true
  # Module name mismatch
  naming.module-name-mismatch:
    enabled: true
    options:
      conventionalModuleNames:
      - constants
      - exceptions
      - helpers
      - protocols
      - types
  # Short variable name
  naming.short-variable:
    enabled: true
    options:
      acceptedShortNames:
      - i
      - j
      - k
      - n
      - m
      - x
      - y
      - z
      - e
      - _
      - f
  # Test naming consistency
  naming.test-naming-consistency:
    enabled: true
  # CORS wildcard origin with credentials
  security.cors-wildcard-with-credentials:
    enabled: true
  # Dangerous function call
  security.dangerous-function-call:
    enabled: true
  # Dependency installed from Git reference
  security.dependency-git-reference:
    enabled: true
  # Dependency installed from local path
  security.dependency-local-path:
    enabled: true
  # Dependency installed from direct URL
  security.dependency-url-reference:
    enabled: true
  # Disabled SSL verification
  security.disabled-ssl-verification:
    enabled: true
  # Django mark_safe on dynamic content
  security.django-mark-safe:
    enabled: true
  # Django raw SQL with dynamic string
  security.django-raw-sql:
    enabled: true
  # Wide error suppression
  security.error-suppression:
    enabled: true
  # Splat-unpacked user input
  security.extract-compact-user-input:
    enabled: true
  # Flask debug enabled
  security.flask-debug-enabled:
    enabled: true
  # Broad GitHub Actions token permissions
  security.github-actions-broad-permissions:
    enabled: true
  # Risky pull_request_target workflow
  security.github-actions-pull-request-target:
    enabled: true
  # Remote script piped into a shell in CI
  security.github-actions-remote-shell:
    enabled: true
  # Repository secret in a PR-triggered workflow
  security.github-actions-secrets-in-pr:
    enabled: true
  # Unpinned GitHub Actions reference
  security.github-actions-unpinned-action:
    enabled: true
  # Hardcoded bind to all interfaces
  security.hardcoded-bind-all-interfaces:
    enabled: true
  # Hardcoded framework SECRET_KEY
  security.hardcoded-framework-secret-key:
    enabled: true
  # Header injection
  security.header-injection:
    enabled: true
  # Insecure random source
  security.insecure-random:
    enabled: true
  # Insecure temporary file
  security.insecure-temp-file:
    enabled: true
  # Insecure TLS protocol
  security.insecure-tls-protocol:
    enabled: true
  # Jinja2 autoescape disabled
  security.jinja2-autoescape-off:
    enabled: true
  # Paramiko accepts unknown host keys
  security.paramiko-no-host-key-check:
    enabled: true
  # Path traversal
  security.path-traversal:
    enabled: true
  # Shell injection
  security.shell-injection:
    enabled: true
  # Silent except
  security.silent-except:
    enabled: true
  # SQL concatenation
  security.sql-concatenation:
    enabled: true
  # Server-side request forgery (SSRF)
  security.ssrf:
    enabled: true
  # Unsafe pickle deserialisation
  security.unsafe-pickle:
    enabled: true
  # Unsafe YAML load
  security.unsafe-yaml-load:
    enabled: true
  # Variable import
  security.variable-import:
    enabled: true
  # Weak cryptographic hash
  security.weak-crypto:
    enabled: true
  # XML external entity (XXE)
  security.xxe:
    enabled: true
  # API key pattern
  sensitive-data.api-key-pattern:
    enabled: true
  # AWS access key
  sensitive-data.aws-access-key:
    enabled: true
  # Database URL with password
  sensitive-data.database-url-password:
    enabled: true
  # GCP service-account key
  sensitive-data.gcp-service-account-key:
    enabled: true
  # Hardcoded env-file secret
  sensitive-data.hardcoded-env-value:
    enabled: true
  # High-entropy string
  sensitive-data.high-entropy-string:
    enabled: true
  # JWT token
  sensitive-data.jwt-token:
    enabled: true
  # PHI pattern
  sensitive-data.phi-pattern:
    enabled: true
  # PII in test fixture
  sensitive-data.pii-test-fixture:
    enabled: true
  # Private key
  sensitive-data.private-key:
    enabled: true
  # URL embedded credentials
  sensitive-data.url-credentials:
    enabled: true
  # Attribute count
  size.attribute-count:
    enabled: true
    threshold: 15
    severity: error
  # Average function length per class
  size.average-function-length:
    enabled: true
    threshold: 100
    severity: error
  # Class length
  size.class-length:
    enabled: true
    threshold: 1000
    severity: error
  # File length
  size.file-length:
    enabled: true
    threshold: 1000
    severity: error
  # Function length
  size.function-length:
    enabled: true
    threshold: 100
    severity: error
  # Parameter count
  size.parameter-count:
    enabled: true
    threshold: 10
    severity: error
  # Public method count
  size.public-method-count:
    enabled: true
    threshold: 10
    severity: error
  # Conditional logic in test
  test-quality.conditional-logic:
    enabled: true
  # Eager test
  test-quality.eager-test:
    enabled: true
    thresholds:
      maxAssertions: 5
  # Empty parametrize
  test-quality.empty-parametrize:
    enabled: true
  # Exception type-only assertion
  test-quality.exception-type-only:
    enabled: true
  # Excessive mocking
  test-quality.excessive-mocking:
    enabled: true
    thresholds:
      maxMocks: 4
  # Test class extends production class
  test-quality.extends-production-class:
    enabled: true
  # Global state mutation in test
  test-quality.global-state-mutation:
    enabled: true
  # Loop assertion without message
  test-quality.loop-assertion-without-message:
    enabled: true
  # Loop in test
  test-quality.loop-in-test:
    enabled: true
  # Magic-number assertion
  test-quality.magic-number-assertion:
    enabled: true
    options:
      allowed_numbers:
      - -1
      - 0
      - 1
      - 2
      - 3
      - 200
      - 201
      - 204
      - 301
      - 302
      - 400
      - 401
      - 403
      - 404
      - 409
      - 422
      - 429
      - 500
      - 502
      - 503
      - 504
  # Mock-only test
  test-quality.mock-only-test:
    enabled: true
  # Mock without expectation
  test-quality.mock-without-expectation:
    enabled: true
  # Mocking domain object
  test-quality.mocking-domain-object:
    enabled: true
    options:
      domain_namespaces: []
  # Multiple AAA cycles
  test-quality.multiple-aaa-cycles:
    enabled: true
    thresholds:
      maxCycles: 2
  # Mystery guest in test
  test-quality.mystery-guest:
    enabled: true
  # Test-naming consistency
  test-quality.naming-consistency:
    enabled: true
  # Test without assertions
  test-quality.no-assertions:
    enabled: true
  # Parametrize without `ids`
  test-quality.parametrize-annotation:
    enabled: true
    thresholds:
      maxCasesWithoutIds: 2
  # Private reflection in test
  test-quality.private-reflection:
    enabled: true
  # Coverage source missing
  test-quality.pytest-coverage-source-missing:
    enabled: true
  # Pytest deprecations not fatal
  test-quality.pytest-deprecations-not-fatal:
    enabled: true
  # Pytest strict-config missing
  test-quality.pytest-strict-config-missing:
    enabled: true
  # Repeated structure without parametrize
  test-quality.repeated-structure-missing-parametrize:
    enabled: true
    thresholds:
      minGroupSize: 3
  # Setup bloat
  test-quality.setup-bloat:
    enabled: true
    thresholds:
      maxSetupLines: 30
  # Skipped without reason
  test-quality.skipped-without-reason:
    enabled: true
  # Sleep in test
  test-quality.sleep-in-test:
    enabled: true
  # Flags tests whose main assertion appears to verify only a static source declaration visible in the same parsed file.
  test-quality.static-analysis-redundant-test:
    enabled: true
  # System under test never called
  test-quality.sut-not-called:
    enabled: true
  # Tautological type assertion
  test-quality.tautological-type-assertion:
    enabled: true
  # Test function too long
  test-quality.test-function-too-long:
    enabled: true
    threshold: 100
    severity: error
  # Test longer than SUT
  test-quality.test-longer-than-sut:
    enabled: true
    options:
      ratio: 2.0
  # Trivial assertion
  test-quality.trivial-assertion:
    enabled: true
  # Trivial snapshot assertion
  test-quality.trivial-snapshot:
    enabled: true
  # Unused mock
  test-quality.unused-mock:
    enabled: true
  # Commented-out code
  waste.commented-out-code:
    enabled: true
  # Empty class
  waste.empty-class:
    enabled: true
  # Empty function
  waste.empty-function:
    enabled: true
  # One-line function wrapper
  waste.one-line-function:
    enabled: true
  # Redundant variable
  waste.redundant-variable:
    enabled: true
  # Unreachable code
  waste.unreachable-code:
    enabled: true
  # Unused import
  waste.unused-import:
    enabled: true
  # Unused parameter
  waste.unused-parameter:
    enabled: true

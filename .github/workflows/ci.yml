name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

      - name: Bash syntax
        run: bash -n scripts/*.sh

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Dependency audit
        run: uv run pip-audit --skip-editable --progress-spinner off

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Typecheck
        run: uv run mypy src

      - name: Rule docs
        run: uv run python -m gruffpy.command.rule_docs --check docs/rules.md

      - name: Test
        run: uv run pytest

      - name: Gruff self-check
        run: uv run gruff-py analyse src tests --fail-on advisory

      - name: Package build
        run: uv build

name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/gruff-py/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project
        run: uv sync --all-extras --dev --python 3.11

      - name: Verify tag matches project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyver=$(uv run python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          if [[ "$tag" != "$pyver" ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match pyproject.toml version '$pyver'"
            exit 1
          fi

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Typecheck
        run: uv run mypy src

      - name: Test
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
